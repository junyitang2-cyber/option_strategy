          - paragraph [ref=e803]: "Bull Call Spread: 用来把观点改成更纯粹的方向表达，通常更依赖标的价格移动。 Diagonal Call Spread: 用来交易近远月 IV 和 Theta 差异，适合价格目标更稳定的场景。 Call Ratio Backspread: 用来把判断从方向切到波动大小，适合事件或突破预期。 Long Combo: 用来理解或复制正股/融资暴露，重点看保证金、利率和指派。 Poor Man's Covered Call: 用来交易近远月 IV 和 Theta 差异，适合价格目标更稳定的场景。 Long Put: 用来把观点改成更纯粹的方向表达，通常更依赖标的价格移动。"
