      - generic [ref=e750]:
        - generic [ref=e751]:
          - heading "腿组合" [level=4] [ref=e752]
          - list [ref=e753]:
            - listitem [ref=e754]: 当前结构：Long 1 CALL @ 100。
            - listitem [ref=e755]: 合约乘数 100，当前价格 100.00，你可以在右侧腿组合里直接改行权价、DTE、IV 和买卖方向。
        - generic [ref=e756]:
          - heading "具体什么场景怎么用" [level=4] [ref=e757]
          - list [ref=e758]:
            - listitem [ref=e759]: 当你有明确上行假设时使用：例如突破平台、回踩支撑后重新放量、财报后预期上修，或行业催化可能推动标的在当前 DTE 内上涨。
            - listitem [ref=e760]: 适合强看涨、想用有限亏损换上行杠杆，且预期上涨速度足以覆盖 Theta 的情形。
        - generic [ref=e761]:
          - heading "开仓参数怎么选" [level=4] [ref=e762]
          - list [ref=e763]:
            - listitem [ref=e764]: 方向买方通常选 ATM 或略 ITM 提高胜率，选 OTM 降低成本但需要更大的价格移动。DTE 不宜太短，除非你交易的是明确事件；否则 Theta 会让方向判断来不及兑现。
            - listitem [ref=e765]: 当前模板的期权行权价范围是 100 到 100，主图的到期参考窗口约 45 天；你可以先拖 DTE 滑杆看时间衰减，再拖 IV 变动看 Vega 敏感度。
        - generic [ref=e766]:
          - heading "如何看图和 Greeks" [level=4] [ref=e767]
          - list [ref=e768]:
            - listitem [ref=e769]: 看绿色到期线从哪个现货价开始转正——那就是你的盈亏平衡点。曲线弯曲度反映 Gamma 加速：价格越接近行权价，Delta 变化越快，赚钱加速但亏钱也加速。
            - listitem [ref=e770]: 再看风险指标：当前 Delta 53.96，Theta/日 -$5.19，Vega/1% $13.94。Delta 告诉你方向暴露，Theta 告诉你每天时间损耗/收入，Vega 告诉你 IV 变动对净值的影响。
            - listitem [ref=e771]: 拖动 IV 变动滑杆观察 Vega——IV 变化会改变所有期权腿的价值。拖动 DTE 滑杆观察 Theta——时间衰减对买方是敌人、对卖方是朋友。试试用 ▶ 播放按钮看连续时间衰减效果。
        - generic [ref=e772]:
          - heading "管理和调整路径" [level=4] [ref=e773]
          - list [ref=e774]:
            - listitem [ref=e775]: 方向买方可以用价格目标、权利金亏损比例或假设失效点止损。若方向对但速度慢，可以滚到更远 DTE；若 IV 已经很高，可以考虑改成价差降低 Vega 风险。
            - listitem [ref=e776]: 先定义最大亏损和退出条件；到期前若价格靠近短腿或 Greeks 明显变化，应提前减仓、滚动或整体平仓，而不是只等到期。
        - generic [ref=e777]:
          - heading "容易踩坑的地方" [level=4] [ref=e778]
          - list [ref=e779]:
            - listitem [ref=e780]: 买太虚值（OTM）的期权虽然便宜但胜率极低。小单试水也要注意 bid-ask 价差，避免隐性成本吃掉潜在利润。
            - listitem [ref=e781]: 净 Theta 为负时，时间站在你对面。方向或波动如果不尽快兑现，图上看似有限亏损，实际体验会是持续失血。
